<!DOCTYPE html>
<html>
<head>
    <title>Chronioñ Start</title>
    <style>
        body { background:#121212; color:white; font-family:Segoe UI; text-align:center; margin-top:100px; }
        input {
            width: 60%; padding: 12px;
            border-radius: 20px; border:none;
            background:#1e1e1e; color:white;
            font-size:18px;
        }
    </style>
</head>
<body>
    <h1>Chronioñ Browser</h1>
    <p>Busca lo que quieras</p>
    <input id="buscar" placeholder="Buscar en Chronioñ...">
    <script>
        document.getElementById("buscar").addEventListener("keypress", function(e){
            if(e.key === "Enter"){
                let q = this.value;
                window.location.href = "https://google.com/search?q=" + encodeURIComponent(q);
            }
        });
    </script>
</body>
</html>
